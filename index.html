<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="ASSETS/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ju Fr - Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --button-font-size: 1rem;
            --button-padding: 22.5px 24px;
            --button-border-radius: 50px;
            --glass-bg: rgba(127.5, 127.5, 127.5, 0.07);
            --glass-border: rgba(230, 230, 230, 0.492);
            --glass-shadow: 0 2px 2.7px rgba(0, 0, 0, 0.3);
            --glass-blur: 15px;
            --color-1: rgb(144, 100, 123);
            --color-2: #C48863;
            --color-3: #9c6791;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Jost', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
            color: white;
            text-align: center;
            position: relative;
            overflow-y: auto;
            background: linear-gradient(to bottom, var(--color-1), var(--color-3));
        }

        /* Effet lampe à lave */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, var(--color-2) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, var(--color-1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, var(--color-3) 0%, transparent 50%);
            background-size: 200% 200%;
            animation: lava 20s ease-in-out infinite;
            z-index: -1;
            opacity: 0.8;
        }

        @keyframes lava {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        /* Bulles pour effet lampe à lave */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 10% 10%, rgba(255, 255, 255, 0.1) 0.5%, transparent 1%),
                radial-gradient(circle at 90% 90%, rgba(255, 255, 255, 0.1) 0.5%, transparent 1%),
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.1) 0.5%, transparent 1%);
            background-size: 100% 100%;
            animation: bubbles 15s ease-in-out infinite;
            z-index: -1;
            opacity: 0.6;
        }

        @keyframes bubbles {
            0% {
                background-position: 0% 0%;
            }
            50% {
                background-position: 100% 100%;
            }
            100% {
                background-position: 0% 0%;
            }
        }

        .container {
            max-width: 800px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
            z-index: 1;
            padding-bottom: 40px;
        }

        h1 {
            font-size: clamp(2rem, 11vw, 5rem); /* Taille responsive */
            font-weight: 1000;
            margin-bottom: 8px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .description {
            font-size: clamp(2rem, 6.5vw, 3rem); /* Taille responsive */
            font-weight: 700;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .availability {
            font-size: clamp(1.2rem, 4.5vw, 2rem); /* Taille responsive */
            font-weight: 400;
            opacity: 0.9;
            margin-bottom: 100px;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }

        .button {
            font-family: 'Jost', sans-serif;
            font-size: clamp(1rem, 3vw, 1.5rem); /* Taille responsive */
            font-weight: 500;
            padding: var(--button-padding);
            border-radius: var(--button-border-radius);
            border: 2px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            box-shadow: var(--glass-shadow);
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .button:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .button:active {
            transform: translateY(0);
            
        }

        .button-icon {
            position: absolute;
            left: 16px;
            width: clamp(30px, 8vw, 50px); /* Taille responsive */
            height: clamp(30px, 8vw, 50px); /* Taille responsive */
        }

        .button-text {
            margin-left: 0;
            position: relative;
        }

        /* Modal pour les coordonnées */
        .contact-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            border-radius: var(--button-border-radius);
            padding: 24px;
            max-width: 400px;
            width: 90%;
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            text-align: center;
        }

        .contact-option {
            display: flex;
            align-items: center;
            background: rgba(127.5, 127.5, 127.5, 0.1);
            border: 1px solid rgba(221.9, 221.9, 221.9, 0.2);
            border-radius: 20px;
            padding: 12px;
            margin: 10px 0;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .contact-option:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .copy-button {
            background: transparent;
            border: none;
            color: white;
            font-family: 'Jost', sans-serif;
            font-size: clamp(0.8rem, 2vw, 1rem); /* Taille responsive */
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .copy-button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .contact-info {
            font-family: 'Jost', sans-serif;
            font-size: clamp(1rem, 2.5vw, 1.125rem); /* Taille responsive */
            font-weight: 400;
            color: white;
        }

        /* Responsive */
        @media (max-width: 600px) {
            body {
                justify-content: flex-start;
            }
            .buttons {
                width: 90%;
            }
            .button {
                padding: 14px 20px;
            }
            .button-icon {
                left: 12px;
            }
        }

        @media (min-width: 601px) {
            body {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Justyne Fresnel</h1>
        <p class="description">Artiste 3D / Designer</p>
        <p class="availability">Disponible à partir d'octobre 2026</p>
        
        <div class="buttons">
            <button class="button" id="contactButton">
                <img src="ASSETS/Contact.svg" alt="Contact" class="button-icon">
                <span class="button-text">CONTACT</span>
            </button>
            <a href="ASSETS/2026_CV_FRESNEL_JUSTYNE.pdf" class="button" target="_blank">
                <img src="ASSETS/CV.svg" alt="CV" class="button-icon">
                <span class="button-text">CV</span>
            </a>
            <a href="https://www.linkedin.com/in/justyne-fresnel" class="button" target="_blank">
                <img src="ASSETS/linkedin.svg" alt="LinkedIn" class="button-icon">
                <span class="button-text">LINKEDIN</span>
            </a>
            <a href="https://www.artstation.com/jukare" class="button" target="_blank">
                <img src="ASSETS/Artstation.svg" alt="ArtStation" class="button-icon">
                <span class="button-text">ARTSTATION</span>
            </a>
        </div>
    </div>

    <!-- Modal pour les coordonnées -->
    <div class="contact-modal" id="contactModal">
        <div class="modal-content">
            <h3 style="margin-bottom: 16px; font-size: clamp(1.2rem, 3vw, 1.3rem);">Choisis une option :</h3>
            <div class="contact-option" id="emailOption">
                <button class="copy-button" id="copyEmail">Copier</button>
                <span class="contact-info" id="emailText">mon@mail</span>
            </div>
            <div class="contact-option" id="phoneOption">
                <button class="copy-button" id="copyPhone">Copier</button>
                <span class="contact-info" id="phoneText">+33 1 23 45 67 89</span>
            </div>
            <button class="copy-button" id="closeModal" style="margin-top: 12px; background: rgba(255, 100, 100, 0.2);">
                Fermer
            </button>
        </div>
    </div>

    <script>
        // Remplace ces valeurs par les tiennes
        const email = "justyne.fresnel@laposte.net";
        const phone = "+33 1 23 45 67 89";

        // Met à jour les textes affichés
        document.getElementById("emailText").textContent = email;
        document.getElementById("phoneText").textContent = phone;

        // Gestion de la modal de contact
        const contactButton = document.getElementById("contactButton");
        const contactModal = document.getElementById("contactModal");
        const copyEmail = document.getElementById("copyEmail");
        const copyPhone = document.getElementById("copyPhone");
        const closeModal = document.getElementById("closeModal");

        contactButton.addEventListener("click", () => {
            contactModal.style.display = "flex";
        });

        closeModal.addEventListener("click", () => {
            contactModal.style.display = "none";
        });

        copyEmail.addEventListener("click", () => {
            navigator.clipboard.writeText(email).then(() => {
                alert("Email copié dans le presse-papiers !");
            });
        });

        copyPhone.addEventListener("click", () => {
            navigator.clipboard.writeText(phone).then(() => {
                alert("Téléphone copié dans le presse-papiers !");
            });
        });

        // Ferme la modal si on clique en dehors
        contactModal.addEventListener("click", (e) => {
            if (e.target === contactModal) {
                contactModal.style.display = "none";
            }
        });
    </script>
</body>
</html>
