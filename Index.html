<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ju Fr - Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --button-font-size: 1rem;
            --button-padding: 12px 24px;
            --button-border-radius: 12px;
            --glass-bg: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.3);
            --glass-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            --glass-blur: 10px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Jost', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #5E3D4E, #C48863, #6C3C62);
            color: white;
            text-align: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        h1 {
            font-size: calc(var(--button-font-size) * 2);
            font-weight: 700;
            margin-bottom: 10px;
        }

        .description {
            font-size: calc(var(--button-font-size) * 1.7);
            font-weight: 400;
            opacity: 0.9;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }

        .button {
            font-family: 'Jost', sans-serif;
            font-size: var(--button-font-size);
            font-weight: 500;
            padding: var(--button-padding);
            border-radius: var(--button-border-radius);
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            box-shadow: var(--glass-shadow);
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .button:active {
            transform: translateY(0);
        }

        .button-icon {
            margin-right: 10px;
            font-size: 1.2em;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .buttons {
                width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ju Fr</h1>
        <p class="description">Artiste 3D / Designer • Disponible à partir d'octobre</p>
        
        <div class="buttons">

                <button class="button" id="contactButton">
                <span class="button-icon">📩</span>
                CONTACTS
            </button>

            <a href="ASSETS/2026_CV_FRESNEL_JUSTYNE.png" class="button" target="_blank">
                <span class="button-icon">📄</span>
                CV
            </a>

            <a href="https://www.linkedin.com/in/justyne-fresnel" class="button" target="_blank">
                <span class="button-icon">🔗</span>
                LINKEDIN
            </a>
            <a href="https://www.artstation.com/jukare" class="button" target="_blank">
                <span class="button-icon">🎨</span>
                ARTSTATION
            </a>

            <!--<a href="https://www.youtube.com/watch?v=ton-id-video" class="button" target="_blank">
                <span class="button-icon">▶️</span>
                SHOWREEL
            </a> -->

        </div>
    </div>

    <!-- Modal pour les coordonnées -->
    <div id="contactModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background: var(--glass-bg); backdrop-filter: blur(var(--glass-blur)); border-radius: var(--button-border-radius); padding: 24px; max-width: 400px; width: 90%; border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); text-align: center;">
            <h3 style="margin-bottom: 16px; font-size: 1.3em;">Choisis une option :</h3>
            <button class="button" id="copyEmail" style="margin-bottom: 12px;">
                Copier mon email
            </button>
            <button class="button" id="copyPhone">
                Copier mon téléphone
            </button>
            <button class="button" id="closeModal" style="margin-top: 12px; background: rgba(255, 100, 100, 0.2);">
                Fermer
            </button>
        </div>
    </div>

    <script>
        // Remplace ces valeurs par les tiennes
        const email = "justyne.fresnel@laposte.net";
        const phone = "+33123456789";

        // Gestion de la modal de contact
        const contactButton = document.getElementById("contactButton");
        const contactModal = document.getElementById("contactModal");
        const copyEmail = document.getElementById("copyEmail");
        const copyPhone = document.getElementById("copyPhone");
        const closeModal = document.getElementById("closeModal");

        contactButton.addEventListener("click", () => {
            contactModal.style.display = "flex";
        });

        closeModal.addEventListener("click", () => {
            contactModal.style.display = "none";
        });

        copyEmail.addEventListener("click", () => {
            navigator.clipboard.writeText(email).then(() => {
                alert("Email copié dans le presse-papiers !");
                contactModal.style.display = "none";
            });
        });

        copyPhone.addEventListener("click", () => {
            navigator.clipboard.writeText(phone).then(() => {
                alert("Téléphone copié dans le presse-papiers !");
                contactModal.style.display = "none";
            });
        });

        // Ferme la modal si on clique en dehors
        contactModal.addEventListener("click", (e) => {
            if (e.target === contactModal) {
                contactModal.style.display = "none";
            }
        });
    </script>
</body>
</html>
